<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEN 304 Registration Portal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background">
        <div class="glass">

            <h1>SEN 304 Registration Portal</h1>

            <!-- LOGIN -->
            <div id="loginPage">

                <h2>Student Login</h2>

                <form id="loginForm">

                    <input
                        type="text"
                        id="loginUsername"
                        placeholder="Username"
                        required>

                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="Password"
                        required>

                    <button type="submit">
                        Login
                    </button>

                </form>

                <p>
                    Don't have an account?
                    <a href="#" onclick="showRegister()">
                        Register Here
                    </a>
                </p>

            </div>

            <!-- REGISTER PAGE -->
            <div id="registerPage" class="hidden">

                <h2>Student Registration</h2>

                <form id="regForm">

                    <input
                        type="text"
                        id="surname"
                        placeholder="Surname"
                        required>

                    <input
                        type="text"
                        id="otherName"
                        placeholder="Other Name"
                        required>

                    <input
                        type="text"
                        id="username"
                        placeholder="Create Username"
                        required>

                    <input
                        type="text"
                        id="regNumber"
                        placeholder="Registration Number"
                        required>

                    <label>Date of Birth</label>

                    <input
                        type="date"
                        id="dob"
                        required>

                    <input
                        type="tel"
                        id="phone"
                        placeholder="Phone Number"
                        required>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                    <select id="gender" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>

                    <select id="state" required>
                        <option value="">Select State</option>
                    </select>

                    <select id="lga" required>
                        <option value="">Select Local Government</option>
                    </select>

                    <input
                        type="text"
                        value="Nigeria"
                        readonly>

                    <label>Passport Photograph</label>

                    <input
                        type="file"
                        id="passport"
                        accept="image/*"
                        required>

                    <img id="preview">

                    <input
                        type="password"
                        id="regPassword"
                        placeholder="Create Password"
                        required>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>

                    <button type="submit">
                        Register
                    </button>

                </form>

                <p>
                    Already have an account?
                    <a href="#" onclick="showLogin()">
                        Login
                    </a>
                </p>

            </div>

            <!-- DASHBOARD -->
            <div id="dashboard" class="hidden">

                <h2>Welcome 🎉</h2>

                <p id="studentName"></p>

                <button onclick="logout()">
                    Logout
                </button>

            </div>

        </div>
    </div>

    <script src="states.js"></script>
    <script src="script.js"></script>

</body>

</html>
